name: iOS CI

on:
  push:
    branches: [main, master]
    paths:
      - 'ios/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'ios/**'

jobs:
  ios-test:
    name: iOS Build & Test
    runs-on: macos-15
    defaults:
      run:
        working-directory: ios
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Find simulator
        id: sim
        run: |
          SIM_ID=$(xcrun simctl list devices available -j | \
            python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data.get('devices', {}).items():
              for d in devices:
                  if 'iPhone' in d.get('name', '') and d.get('isAvailable', False):
                      print(d['udid'])
                      sys.exit(0)
          sys.exit(1)
          ")
          echo "id=$SIM_ID" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          SIM_ID: ${{ steps.sim.outputs.id }}
        run: |
          xcodebuild build-for-testing \
            -project "AMI Assist.xcodeproj" \
            -scheme "AMI Assist" \
            -sdk iphonesimulator \
            -destination "id=$SIM_ID" \
            -quiet

      - name: Test
        env:
          SIM_ID: ${{ steps.sim.outputs.id }}
        run: |
          xcodebuild test-without-building \
            -project "AMI Assist.xcodeproj" \
            -scheme "AMI Assist" \
            -sdk iphonesimulator \
            -destination "id=$SIM_ID" \
            -only-testing:"AMI Assist Tests" \
            -resultBundlePath TestResults.xcresult

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: ios/TestResults.xcresult
          retention-days: 7
