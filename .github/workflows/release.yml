name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build & Release
    runs-on: macos-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: tauri-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri-app/src-tauri

      - name: Install Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Decode certificate
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERT_PATH

          # Create temporary keychain
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH

          # Import certificate
          security import $CERT_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "" $KEYCHAIN_PATH

          # Add to search list
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain-db

          # Verify
          security find-identity -v -p codesigning $KEYCHAIN_PATH

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        env:
          APPLE_SIGNING_IDENTITY: "Developer ID Application: Arash Zohoor (F982984LCX)"
        run: pnpm tauri build

      - name: Determine ONNX Runtime version
        id: ort-version
        run: |
          # Single source of truth for the onnxruntime pin lives in scripts/setup-ort.sh
          # so local and CI builds stay in lockstep.
          ORT_VERSION=$(grep '^ORT_VERSION=' scripts/setup-ort.sh | cut -d'"' -f2)
          if [ -z "$ORT_VERSION" ]; then
            echo "Error: could not extract ORT_VERSION from scripts/setup-ort.sh"
            exit 1
          fi
          echo "Pinning onnxruntime to ${ORT_VERSION}"
          echo "version=${ORT_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Bundle ONNX Runtime
        id: bundle-ort
        env:
          APPLE_SIGNING_IDENTITY: "Developer ID Application: Arash Zohoor (F982984LCX)"
          ORT_VERSION: ${{ steps.ort-version.outputs.version }}
        run: |
          BUNDLE_DIR="src-tauri/target/release/bundle/macos"
          APP_NAME="AMI Assist"
          FRAMEWORKS_DIR="${BUNDLE_DIR}/${APP_NAME}.app/Contents/Frameworks"
          mkdir -p "$FRAMEWORKS_DIR"

          python3 -m venv /tmp/ort-venv
          /tmp/ort-venv/bin/pip install "onnxruntime==${ORT_VERSION}"
          DYLIB=$(/usr/bin/find /tmp/ort-venv -name "libonnxruntime.*.dylib" | head -1)

          if [ -z "$DYLIB" ]; then
            echo "Error: ONNX Runtime dylib not found"
            exit 1
          fi

          cp "$DYLIB" "$FRAMEWORKS_DIR/"
          DYLIB_NAME=$(basename "$DYLIB")
          BUNDLED_DYLIB="${FRAMEWORKS_DIR}/${DYLIB_NAME}"
          echo "Bundled: $DYLIB_NAME"
          echo "dylib_path=${BUNDLED_DYLIB}" >> "$GITHUB_OUTPUT"

          codesign --force --sign "$APPLE_SIGNING_IDENTITY" "$BUNDLED_DYLIB"
          codesign --force --deep --sign "$APPLE_SIGNING_IDENTITY" "${BUNDLE_DIR}/${APP_NAME}.app"
          codesign --verify --deep --strict "${BUNDLE_DIR}/${APP_NAME}.app"
          echo "App bundle re-signed with ONNX Runtime"

      - name: Verify bundled ONNX Runtime is loadable
        env:
          # `codesign --verify` is a signature check, not a runtime check —
          # this step exercises the actual Session::builder() symbol resolution
          # before the artifact is published.
          DYLIB: ${{ steps.bundle-ort.outputs.dylib_path }}
        run: |
          if [ -z "$DYLIB" ] || [ ! -f "$DYLIB" ]; then
            echo "FAIL: bundle step did not export a dylib path (got: '${DYLIB}')"
            exit 1
          fi

          echo "Verifying $DYLIB"

          # 1. Architecture check — clinic workstations are arm64-only per latest.json
          if ! lipo -info "$DYLIB" | grep -q arm64; then
            echo "FAIL: $DYLIB is not arm64"
            lipo -info "$DYLIB"
            exit 1
          fi

          # 2. Codesign sanity on the dylib itself (the existing --verify --deep
          #    --strict check is on the .app bundle; this confirms the nested
          #    dylib carries its own valid signature).
          codesign -d --verbose=4 "$DYLIB"

          # 3. Real load test — runs the same Session::builder() call as production.
          #    Catches version-mismatch, ABI-break, wrong-arch, missing-symbol
          #    failures that codesign --verify cannot see. See tools/ort_smoke.rs
          #    for exit-code semantics.
          cd src-tauri
          ORT_DYLIB_PATH="$DYLIB" cargo run --release --bin ort_smoke

      - name: Create updater bundle and sign
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          BUNDLE_DIR="src-tauri/target/release/bundle/macos"
          APP_NAME="AMI Assist"

          # Create .tar.gz from .app directory
          tar -czf "${BUNDLE_DIR}/${APP_NAME}.app.tar.gz" -C "${BUNDLE_DIR}" "${APP_NAME}.app"
          echo "Created tar.gz:"
          ls -la "${BUNDLE_DIR}/${APP_NAME}.app.tar.gz"

          # Sign the tar.gz with tauri signer
          npx tauri signer sign \
            "${BUNDLE_DIR}/${APP_NAME}.app.tar.gz" \
            --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
            --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"

          echo "Signature:"
          cat "${BUNDLE_DIR}/${APP_NAME}.app.tar.gz.sig"

      - name: Generate latest.json
        run: |
          BUNDLE_DIR="src-tauri/target/release/bundle/macos"
          SIG_FILE="${BUNDLE_DIR}/AMI Assist.app.tar.gz.sig"
          VERSION="${GITHUB_REF_NAME#v}"
          SIGNATURE=$(cat "$SIG_FILE")
          TAR_NAME="AMI.Assist.app.tar.gz"

          cat > latest.json <<ENDJSON
          {
            "version": "${VERSION}",
            "notes": "AMI Assist ${GITHUB_REF_NAME}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${SIGNATURE}",
                "url": "https://github.com/zohoora/transcriptionapp/releases/download/${GITHUB_REF_NAME}/${TAR_NAME}"
              }
            }
          }
          ENDJSON

          echo "Generated latest.json:"
          cat latest.json

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUNDLE_DIR="src-tauri/target/release/bundle"
          TAR_GZ="${BUNDLE_DIR}/macos/AMI Assist.app.tar.gz"
          DMG="${BUNDLE_DIR}/dmg/AMI Assist_${GITHUB_REF_NAME#v}_aarch64.dmg"

          gh release create "${GITHUB_REF_NAME}" \
            --title "AMI Assist ${GITHUB_REF_NAME}" \
            --generate-notes \
            "${TAR_GZ}" \
            "${DMG}" \
            latest.json
