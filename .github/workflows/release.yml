name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build & Release
    runs-on: macos-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: tauri-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri-app/src-tauri

      - name: Install frontend dependencies
        run: pnpm install

      - name: Install Tauri CLI
        run: pnpm add -D @tauri-apps/cli

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build

      - name: Generate latest.json
        run: |
          BUNDLE_DIR="src-tauri/target/release/bundle"
          TAR_GZ="${BUNDLE_DIR}/macos/Transcription App.app.tar.gz"
          SIG_FILE="${TAR_GZ}.sig"

          if [ ! -f "$SIG_FILE" ]; then
            echo "ERROR: Signature file not found at ${SIG_FILE}"
            ls -la "${BUNDLE_DIR}/macos/"
            exit 1
          fi

          VERSION="${GITHUB_REF_NAME#v}"
          SIGNATURE=$(cat "$SIG_FILE")
          TAR_NAME="Transcription.App_aarch64.app.tar.gz"

          cat > latest.json << ENDJSON
          {
            "version": "${VERSION}",
            "notes": "Scribe ${GITHUB_REF_NAME}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${SIGNATURE}",
                "url": "https://github.com/zohoora/transcriptionapp/releases/download/${GITHUB_REF_NAME}/${TAR_NAME}"
              }
            }
          }
          ENDJSON

          echo "Generated latest.json:"
          cat latest.json

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUNDLE_DIR="src-tauri/target/release/bundle"
          TAR_GZ="${BUNDLE_DIR}/macos/Transcription App.app.tar.gz"
          DMG="${BUNDLE_DIR}/dmg/Transcription App_${GITHUB_REF_NAME#v}_aarch64.dmg"
          TAR_NAME="Transcription.App_aarch64.app.tar.gz"

          gh release create "${GITHUB_REF_NAME}" \
            --title "Scribe ${GITHUB_REF_NAME}" \
            --generate-notes \
            "${TAR_GZ}#${TAR_NAME}" \
            "${DMG}" \
            latest.json
