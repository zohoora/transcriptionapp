name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build & Release
    runs-on: macos-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: tauri-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri-app/src-tauri

      - name: Install Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Decode certificate
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERT_PATH

          # Create temporary keychain
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH

          # Import certificate
          security import $CERT_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "" $KEYCHAIN_PATH

          # Add to search list
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain-db

          # Verify
          security find-identity -v -p codesigning $KEYCHAIN_PATH

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        env:
          APPLE_SIGNING_IDENTITY: "Developer ID Application: Arash Zohoor (F982984LCX)"
        run: pnpm tauri build

      - name: Create updater bundle and sign
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          BUNDLE_DIR="src-tauri/target/release/bundle/macos"
          APP_NAME="AMI Assist"

          # Create .tar.gz from .app directory
          tar -czf "${BUNDLE_DIR}/${APP_NAME}.app.tar.gz" -C "${BUNDLE_DIR}" "${APP_NAME}.app"
          echo "Created tar.gz:"
          ls -la "${BUNDLE_DIR}/${APP_NAME}.app.tar.gz"

          # Sign the tar.gz with tauri signer
          npx tauri signer sign \
            "${BUNDLE_DIR}/${APP_NAME}.app.tar.gz" \
            --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
            --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"

          echo "Signature:"
          cat "${BUNDLE_DIR}/${APP_NAME}.app.tar.gz.sig"

      - name: Generate latest.json
        run: |
          BUNDLE_DIR="src-tauri/target/release/bundle/macos"
          SIG_FILE="${BUNDLE_DIR}/AMI Assist.app.tar.gz.sig"
          VERSION="${GITHUB_REF_NAME#v}"
          SIGNATURE=$(cat "$SIG_FILE")
          TAR_NAME="AMI.Assist.app.tar.gz"

          cat > latest.json <<ENDJSON
          {
            "version": "${VERSION}",
            "notes": "AMI Assist ${GITHUB_REF_NAME}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${SIGNATURE}",
                "url": "https://github.com/zohoora/transcriptionapp/releases/download/${GITHUB_REF_NAME}/${TAR_NAME}"
              }
            }
          }
          ENDJSON

          echo "Generated latest.json:"
          cat latest.json

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUNDLE_DIR="src-tauri/target/release/bundle"
          TAR_GZ="${BUNDLE_DIR}/macos/AMI Assist.app.tar.gz"
          DMG="${BUNDLE_DIR}/dmg/AMI Assist_${GITHUB_REF_NAME#v}_aarch64.dmg"

          gh release create "${GITHUB_REF_NAME}" \
            --title "AMI Assist ${GITHUB_REF_NAME}" \
            --generate-notes \
            "${TAR_GZ}" \
            "${DMG}" \
            latest.json
