name: AMI Assist
options:
  bundleIdPrefix: com.transcriptionapp
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

targets:
  AMI Assist:
    type: application
    platform: iOS
    sources:
      - AMI Assist
    info:
      path: AMI Assist/Info.plist
      properties:
        UIBackgroundModes:
          - audio
        NSMicrophoneUsageDescription: AMI Assist needs microphone access to record appointments.
        NSLocalNetworkUsageDescription: AMI Assist connects to your clinic server on the local network.
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.transcriptionapp.mobile
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
