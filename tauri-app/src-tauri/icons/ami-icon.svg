<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8"/>
      <stop offset="100%" style="stop-color:#0d47a1"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.3)"/>
      <stop offset="50%" style="stop-color:rgba(255,255,255,0.6)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.3)"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Medical cross (subtle, centered) -->
  <rect x="224" y="140" width="64" height="232" rx="12" fill="rgba(255,255,255,0.15)"/>
  <rect x="140" y="224" width="232" height="64" rx="12" fill="rgba(255,255,255,0.15)"/>
  <!-- Sound waves (ambient listening) -->
  <path d="M156 196 Q156 256 156 316" stroke="white" stroke-width="14" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M116 166 Q116 256 116 346" stroke="white" stroke-width="14" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M76 196 Q76 256 76 316" stroke="white" stroke-width="14" fill="none" stroke-linecap="round" opacity="0.3"/>
  <!-- Sound waves (right side, mirrored) -->
  <path d="M356 196 Q356 256 356 316" stroke="white" stroke-width="14" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M396 166 Q396 256 396 346" stroke="white" stroke-width="14" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M436 196 Q436 256 436 316" stroke="white" stroke-width="14" fill="none" stroke-linecap="round" opacity="0.3"/>
  <!-- Central AI dot -->
  <circle cx="256" cy="256" r="28" fill="white" opacity="0.9"/>
  <circle cx="256" cy="256" r="14" fill="url(#bg)"/>
  <!-- Pulse ring -->
  <circle cx="256" cy="256" r="60" stroke="white" stroke-width="4" fill="none" opacity="0.4"/>
  <circle cx="256" cy="256" r="95" stroke="white" stroke-width="3" fill="none" opacity="0.2"/>
